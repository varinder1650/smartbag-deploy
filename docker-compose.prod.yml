# docker-compose.prod.yml
# ============================================
# Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
# ============================================

services:
  backend:
    environment:
      - ENVIRONMENT=Production
      - MONGO_URI=mongodb://mongo:27017
      - DB_NAME=smartbag
      - REDIS_URL=redis://redis:6379/0
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  admin-backend:
    environment:
      - ENVIRONMENT=Production
      - MONGO_URI=mongodb://mongo:27017
      - DB_NAME=smartbag
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_URL=postgresql+asyncpg://${POSTGRES_USER:-smartbag}:${POSTGRES_PASSWORD:-smartbag_secret}@postgres:5432/${POSTGRES_DB:-smartbag_inventory}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  admin-panel:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  mongo:
    command: mongod --auth --bind_ip_all
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-smartbag_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-change_me_mongo_password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-smartbag}
    # No exposed ports in production

  redis:
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-change_me_redis_password}
    # No exposed ports in production

  postgres:
    # No exposed ports in production

  nginx:
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.base.conf:/etc/nginx/nginx.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot
    container_name: smartbag-certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"
    networks:
      - smartbag-net
    restart: unless-stopped

volumes:
  certbot_webroot:
  certbot_certs:

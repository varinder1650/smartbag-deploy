events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Upstreams
    upstream backend       { server backend:8000; }
    upstream admin_backend { server admin-backend:8001; }
    upstream admin_panel   { server admin-panel:8080; }

    # ─── api.localhost → Customer API ───────────────────
    server {
        listen 80;
        server_name api.localhost;

        location / {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Customer API WebSockets
        location /support/chat/ws {
            proxy_pass http://backend/api/support/chat/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        location /ws/ {
            proxy_pass http://backend/api/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }
    }

    # ─── admin-api.localhost → Admin API ────────────────
    server {
        listen 80;
        server_name admin-api.localhost;

        # Admin WebSocket
        location /admin/ws {
            proxy_pass http://admin_backend/admin/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        location / {
            proxy_pass http://admin_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── admin.localhost → Admin Panel ──────────────────
    server {
        listen 80;
        server_name admin.localhost;

        location / {
            proxy_pass http://admin_panel/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Vite HMR WebSocket (dev only)
        location /@vite/ {
            proxy_pass http://admin_panel/@vite/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ─── localhost → Health/Status ──────────────────────
    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://backend/health;
        }

        location /monitor {
            proxy_pass http://backend/monitor;
        }
    }
}
